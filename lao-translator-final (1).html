<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ແປພາສາລາວ · Lao Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700&family=Noto+Sans+SC:wght@400;600&family=Noto+Sans+KR:wght@400;600&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --red: #ce2029; --blue: #1565c0;
  --gold: #f5c842; --gold-dim: rgba(245,200,66,0.12); --gold-glow: rgba(245,200,66,0.3);
  --white: #e8edf5; --muted: #8b949e; --border: rgba(245,200,66,0.15);
  --border-hi: rgba(245,200,66,0.45); --green: #4caf50;
}
body {
  font-family: 'Noto Sans Lao','Noto Sans SC',sans-serif;
  background: var(--bg); color: var(--white);
  min-height: 100vh; overflow-x: hidden;
}
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(206,32,41,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,63,135,0.12) 0%, transparent 50%);
}
.page { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 24px 16px 80px; }

header { text-align: center; margin-bottom: 24px; }
.flag { display: flex; justify-content: center; gap: 3px; margin-bottom: 14px; }
.fr { width: 28px; height: 5px; background: var(--red); border-radius: 2px; }
.fb { width: 66px; height: 5px; background: var(--blue); border-radius: 2px; position: relative; }
.fb::after { content:'●'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:9px; }
.title { font-family:'Noto Sans Lao',sans-serif; font-size:1.8rem; font-weight:700; color:var(--gold); text-shadow:0 0 24px var(--gold-glow); }
.subtitle { font-size:0.8rem; color:var(--muted); margin-top:4px; letter-spacing:0.1em; }
.badge { display:inline-block; margin-top:10px; padding:3px 12px; border:1px solid var(--border-hi); border-radius:20px; font-size:0.68rem; color:var(--gold); background:var(--gold-dim); }

.lang-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.lang-wrap { flex:1; position:relative; }
.lang-wrap select { width:100%; appearance:none; background:var(--card); border:1px solid var(--border-hi); color:var(--white); padding:11px 36px 11px 14px; font-family:'Noto Sans Lao','Noto Sans SC',sans-serif; font-size:0.9rem; border-radius:10px; cursor:pointer; outline:none; }
.lang-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--gold); pointer-events:none; font-size:0.75rem; }
.swap-btn { width:42px; height:42px; flex-shrink:0; background:var(--card); border:1px solid var(--border-hi); border-radius:50%; color:var(--gold); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
.swap-btn:active { background:var(--red); border-color:var(--red); color:white; transform:rotate(180deg); }

.card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:12px; box-shadow:0 6px 30px rgba(0,0,0,0.35); }
.panel-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:rgba(0,0,0,0.25); border-bottom:1px solid var(--border); }
.panel-label { font-size:0.72rem; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); }
.char-ct { font-size:0.68rem; color:var(--muted); }

textarea { width:100%; min-height:140px; padding:16px; background:transparent; border:none; outline:none; color:var(--white); font-family:'Noto Sans Lao','Noto Sans SC','Noto Sans KR','Noto Sans JP',sans-serif; font-size:1rem; line-height:1.85; resize:none; -webkit-appearance:none; }
textarea::placeholder { color:rgba(139,148,158,0.45); }

.output-wrap { position:relative; min-height:140px; }
.output-text { padding:16px; font-family:'Noto Sans Lao','Noto Sans SC','Noto Sans KR','Noto Sans JP',sans-serif; font-size:1rem; line-height:1.85; color:var(--white); white-space:pre-wrap; min-height:140px; }
.ph { color:rgba(139,148,158,0.4); font-style:italic; font-size:0.9rem; }

.loading-ov { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:rgba(22,27,34,0.9); }
.loading-ov.on { display:flex; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-lbl { font-size:0.78rem; color:var(--gold); letter-spacing:0.1em; }

.card-foot { display:flex; gap:6px; padding:8px 12px; border-top:1px solid var(--border); background:rgba(0,0,0,0.15); flex-wrap:wrap; }
.foot-btn { background:none; border:1px solid transparent; color:var(--muted); padding:6px 12px; border-radius:6px; font-size:0.72rem; cursor:pointer; font-family:'Noto Sans Lao','Noto Sans SC',sans-serif; transition:all 0.2s; -webkit-tap-highlight-color:transparent; }
.foot-btn:active { color:var(--gold); border-color:var(--border-hi); background:var(--gold-dim); }
.foot-btn.ok { color:var(--green); border-color:rgba(76,175,80,0.4); background:rgba(76,175,80,0.1); }

.go-btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--red),#9c1020); border:none; border-radius:12px; color:white; font-family:'Noto Sans Lao','Noto Sans SC',sans-serif; font-size:1rem; font-weight:600; letter-spacing:0.1em; cursor:pointer; box-shadow:0 4px 20px rgba(206,32,41,0.3); margin-bottom:10px; -webkit-tap-highlight-color:transparent; transition:opacity 0.2s; }
.go-btn:active { opacity:0.8; }
.go-btn:disabled { opacity:0.5; cursor:not-allowed; }

.err { background:rgba(206,32,41,0.1); border:1px solid rgba(206,32,41,0.35); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:#ff6b6b; margin-bottom:10px; display:none; line-height:1.6; }
.err.on { display:block; }

.hint { text-align:center; font-size:0.68rem; color:var(--muted); margin-bottom:20px; }

.section-title { font-size:0.7rem; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.phrases { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:24px; }
.ph-card { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:10px 12px; cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent; }
.ph-card:active { border-color:var(--gold); background:var(--gold-dim); }
.ph-lao { font-family:'Noto Sans Lao',sans-serif; font-size:0.95rem; color:var(--gold); margin-bottom:3px; }
.ph-zh { font-size:0.7rem; color:var(--muted); }

.history { display:none; margin-bottom:24px; }
.history.on { display:block; }
.h-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 12px; margin-bottom:6px; cursor:pointer; display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:0.82rem; -webkit-tap-highlight-color:transparent; }
.h-src { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.h-tgt { color:var(--white); font-family:'Noto Sans Lao',sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

footer { text-align:center; font-size:0.62rem; color:rgba(139,148,158,0.35); letter-spacing:0.1em; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <header>
    <div class="flag"><div class="fr"></div><div class="fb"></div><div class="fr"></div></div>
    <div class="title">ແປພາສາລາວ</div>
    <div class="subtitle">Lao Precision Translator</div>
    <div class="badge">ລາວ · 中文 · English · 한국어 · 日本語</div>
  </header>

  <div class="lang-row">
    <div class="lang-wrap">
      <select id="srcLang">
        <option value="lo">ພາສາລາວ (Lao)</option>
        <option value="zh" selected>中文</option>
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="th">ภาษาไทย (Thai)</option>
      </select>
    </div>
    <button class="swap-btn" id="swapBtn">⇄</button>
    <div class="lang-wrap">
      <select id="tgtLang">
        <option value="lo" selected>ພາສາລາວ (Lao)</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="th">ภาษาไทย (Thai)</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="panel-head">
      <span class="panel-label" id="srcLabel">中文</span>
      <span class="char-ct" id="charCt">0</span>
    </div>
    <textarea id="srcText" placeholder="输入文字… / ພິມຂໍ້ຄວາມ… / Type here…" maxlength="500"></textarea>
    <div class="card-foot">
      <button class="foot-btn" id="clearBtn">✕ 清空</button>
    </div>
  </div>

  <div class="card">
    <div class="panel-head">
      <span class="panel-label" id="tgtLabel">ພາສາລາວ</span>
      <span class="char-ct" id="outCt">—</span>
    </div>
    <div class="output-wrap">
      <div class="output-text" id="outputText"><span class="ph">译文将在此显示… / ຜົນການແປ…</span></div>
      <div class="loading-ov" id="loading">
        <div class="spinner"></div>
        <div class="loading-lbl">ກຳລັງແປ…</div>
      </div>
    </div>
    <div class="card-foot">
      <button class="foot-btn" id="copyBtn">⎘ 复制</button>
      <button class="foot-btn" id="speakBtn">♪ 朗读</button>
    </div>
  </div>

  <div class="err" id="errBox"></div>
  <button class="go-btn" id="goBtn">ແປ · 翻译 · Translate · 번역</button>
  <div class="hint">💡 点击下方短句快速翻译</div>

  <div class="section-title">常用短句</div>
  <div class="phrases" id="phraseGrid"></div>

  <div class="history" id="historyBox">
    <div class="section-title">翻译记录</div>
    <div id="historyList"></div>
  </div>
</div>
<footer>ແປພາສາລາວ · iOS & Android Compatible · Free</footer>

<script>
const LANGS = { lo:'ພາສາລາວ', zh:'中文', en:'English', ko:'한국어', ja:'日本語', th:'ภาษาไทย' };

const PHRASES = [
  {lao:'ສະບາຍດີ', zh:'你好', en:'Hello'},
  {lao:'ຂໍຂອບໃຈ', zh:'谢谢', en:'Thank you'},
  {lao:'ລາຄາເທົ່າໃດ?', zh:'多少钱?', en:'How much?'},
  {lao:'ຂ້ອຍບໍ່ເຂົ້າໃຈ', zh:'我不明白', en:'I don\'t understand'},
  {lao:'ຂໍໂທດ', zh:'对不起', en:'Sorry'},
  {lao:'ຍິນດີຕ້ອນຮັບ', zh:'欢迎', en:'Welcome'},
  {lao:'ຫ້ອງນໍ້າຢູ່ໃສ?', zh:'卫生间在哪?', en:'Where is toilet?'},
  {lao:'ຊ່ວຍຂ້ອຍດ້ວຍ', zh:'请帮帮我', en:'Please help me'},
];

// Build phrases
const grid = document.getElementById('phraseGrid');
PHRASES.forEach(p => {
  const c = document.createElement('div');
  c.className = 'ph-card';
  c.innerHTML = `<div class="ph-lao">${p.lao}</div><div class="ph-zh">${p.zh} · ${p.en}</div>`;
  c.addEventListener('click', () => {
    srcLang.value = 'lo'; tgtLang.value = 'zh'; updateLabels();
    srcText.value = p.lao; charCt.textContent = p.lao.length;
  });
  grid.appendChild(c);
});

const srcLang    = document.getElementById('srcLang');
const tgtLang    = document.getElementById('tgtLang');
const srcLabel   = document.getElementById('srcLabel');
const tgtLabel   = document.getElementById('tgtLabel');
const srcText    = document.getElementById('srcText');
const outputText = document.getElementById('outputText');
const goBtn      = document.getElementById('goBtn');
const loading    = document.getElementById('loading');
const errBox     = document.getElementById('errBox');
const charCt     = document.getElementById('charCt');
const outCt      = document.getElementById('outCt');
const copyBtn    = document.getElementById('copyBtn');
const clearBtn   = document.getElementById('clearBtn');
const speakBtn   = document.getElementById('speakBtn');
const swapBtn    = document.getElementById('swapBtn');
const historyBox = document.getElementById('historyBox');
const historyList= document.getElementById('historyList');

let result = '';
let history = [];

function updateLabels() {
  srcLabel.textContent = LANGS[srcLang.value];
  tgtLabel.textContent = LANGS[tgtLang.value];
}
srcLang.addEventListener('change', updateLabels);
tgtLang.addEventListener('change', updateLabels);
updateLabels();

srcText.addEventListener('input', () => { charCt.textContent = srcText.value.length; });

clearBtn.addEventListener('click', () => {
  srcText.value = ''; charCt.textContent = 0;
  outputText.innerHTML = '<span class="ph">译文将在此显示… / ຜົນການແປ…</span>';
  result = ''; outCt.textContent = '—'; errBox.classList.remove('on');
});

swapBtn.addEventListener('click', () => {
  const tmp = srcLang.value; srcLang.value = tgtLang.value; tgtLang.value = tmp; updateLabels();
  if (result) { srcText.value = result; charCt.textContent = result.length; outputText.innerHTML = '<span class="ph">译文将在此显示…</span>'; result = ''; outCt.textContent = '—'; }
});

copyBtn.addEventListener('click', () => {
  if (!result) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(result).then(() => {
      copyBtn.textContent = '✓ 已复制'; copyBtn.classList.add('ok');
      setTimeout(() => { copyBtn.textContent = '⎘ 复制'; copyBtn.classList.remove('ok'); }, 2000);
    });
  } else {
    // Fallback for iOS
    const ta = document.createElement('textarea');
    ta.value = result; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copyBtn.textContent = '✓ 已复制'; copyBtn.classList.add('ok');
    setTimeout(() => { copyBtn.textContent = '⎘ 复制'; copyBtn.classList.remove('ok'); }, 2000);
  }
});

speakBtn.addEventListener('click', async () => {
  if (!result) return;
  const lang = tgtLang.value;
  const ttsLang = { lo:'lo', zh:'zh-CN', en:'en-US', ko:'ko-KR', ja:'ja-JP' }[lang] || 'lo';
  const text = result.slice(0, 200);

  speakBtn.textContent = '⏳ 加载...';
  speakBtn.disabled = true;

  // For Lao: translate to Thai first, then speak with Thai TTS
  if (lang === 'lo') {
    try {
      speakBtn.textContent = '⏳ 转换中...';
      const thaiUrl = `${GAS_URL}?text=${encodeURIComponent(text)}&source=lo&target=th`;
      const r = await fetch(thaiUrl, { redirect: 'follow' });
      const d = await r.json();
      if (d.translation) {
        const u = new SpeechSynthesisUtterance(d.translation);
        u.lang = 'th-TH';
        u.onstart = () => { speakBtn.textContent = '🔊 播放中'; };
        u.onend = () => { speakBtn.textContent = '♪ 朗读'; speakBtn.disabled = false; };
        u.onerror = () => { speakBtn.textContent = '♪ 朗读'; speakBtn.disabled = false; };
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
        return;
      }
    } catch(e) {}
    speakBtn.textContent = '♪ 朗读';
    speakBtn.disabled = false;
    errBox.textContent = '⚠ 朗读失败，请检查网络后重试';
    errBox.classList.add('on');
    setTimeout(() => errBox.classList.remove('on'), 3000);
    return;
  }

  // For other languages: use device TTS
  const codes = { zh:'zh-CN', en:'en-US', ko:'ko-KR', ja:'ja-JP', th:'th-TH' };
  const u = new SpeechSynthesisUtterance(result);
  u.lang = codes[lang] || 'en-US';
  u.onstart = () => { speakBtn.textContent = '🔊 播放中'; };
  u.onend = () => { speakBtn.textContent = '♪ 朗读'; speakBtn.disabled = false; };
  u.onerror = () => { speakBtn.textContent = '♪ 朗读'; speakBtn.disabled = false; };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
});

goBtn.addEventListener('click', doTranslate);

// Multiple free API endpoints - try each until one works (iOS compatible)
async function doTranslate() {
  const text = srcText.value.trim();
  if (!text) return;

  const src = srcLang.value;
  const tgt = tgtLang.value;
  if (src === tgt) { outputText.textContent = text; result = text; return; }

  goBtn.disabled = true;
  loading.classList.add('on');
  errBox.classList.remove('on');
  result = '';

  // Language codes
  const gtCode = { lo:'lo', zh:'zh-CN', en:'en', ko:'ko', ja:'ja', th:'th' };

  // Try Google Apps Script first, then fallbacks
  const strategies = [
    () => tryGoogleAppsScript(text, gtCode[src], gtCode[tgt]),
    () => tryGoogleTranslate(text, gtCode[src], gtCode[tgt]),
    () => tryMyMemory(text, gtCode[src], gtCode[tgt]),
  ];

  let translated = null;
  let lastErr = '';

  for (const fn of strategies) {
    try {
      translated = await fn();
      if (translated && translated !== text) break;
    } catch(e) { 
      lastErr = e.message;
      console.log('Strategy failed:', e.message);
    }
  }

  if (translated && translated !== text) {
    result = translated;
    outputText.textContent = result;
    outCt.textContent = result.length;
    addHistory(text, result);
  } else {
    errBox.innerHTML = `⚠ 翻译失败：${lastErr}<br><small style="opacity:0.7">请确保网络正常，可以访问 Google。</small>`;
    errBox.classList.add('on');
  }

  goBtn.disabled = false;
  loading.classList.remove('on');
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbw3CibuVkYvJCM4n_1v07yFClGq5BbhW9x86OiYN6tUUflLkHOckwxCQnSwFP72gdft/exec';

async function tryGoogleAppsScript(text, src, tgt) {
  // Google Apps Script redirects, must follow redirects
  const url = `${GAS_URL}?text=${encodeURIComponent(text)}&source=${src}&target=${tgt}`;
  const r = await fetch(url, { redirect: 'follow' });
  if (!r.ok) throw new Error('GAS ' + r.status);
  const txt = await r.text();
  // Handle both JSON and plain text responses
  try {
    const d = JSON.parse(txt);
    if (d.translation) return d.translation;
    throw new Error('no translation field');
  } catch(e) {
    if (txt && txt.trim()) return txt.trim();
    throw new Error('invalid response');
  }
}

async function tryGoogleTranslate(text, src, tgt) {
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Google ' + r.status);
  const d = await r.json();
  if (!d || !d[0]) throw new Error('no data');
  const res = d[0].map(seg => seg && seg[0] ? seg[0] : '').join('');
  if (!res) throw new Error('empty');
  return res;
}

async function tryMyMemory(text, src, tgt) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('MyMemory ' + r.status);
  const d = await r.json();
  if (d.responseStatus !== 200) throw new Error(d.responseDetails);
  return d.responseData.translatedText;
}

function addHistory(src, tgt) {
  history.unshift({ src, tgt, sl: srcLang.value, tl: tgtLang.value });
  if (history.length > 6) history.pop();
  historyBox.classList.add('on');
  historyList.innerHTML = '';
  history.forEach(item => {
    const d = document.createElement('div');
    d.className = 'h-item';
    d.innerHTML = `<div class="h-src">${item.src.slice(0,35)}${item.src.length>35?'…':''}</div>
                   <div class="h-tgt">${item.tgt.slice(0,35)}${item.tgt.length>35?'…':''}</div>`;
    d.addEventListener('click', () => {
      srcText.value = item.src; charCt.textContent = item.src.length;
      outputText.textContent = item.tgt; outCt.textContent = item.tgt.length;
      result = item.tgt; srcLang.value = item.sl; tgtLang.value = item.tl; updateLabels();
    });
    historyList.appendChild(d);
  });
}
</script>
</body>
</html>
